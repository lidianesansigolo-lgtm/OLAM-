<!DOCTYPE html>
<html>
  <body>
    <!-- Static form skeleton for Netlify build-time detection -->
    <!-- Users never see this file. -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="inquiry"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="continuum" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="inquiry"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
